<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GundogduTemizlik|PremiumTemizlik</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- WHATSAPP ICON CDN -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
html { scroll-behavior: smooth; }

body {
  margin:0;
  font-family: 'Inter', sans-serif;
  background:#020617;
  color:white;
  opacity:0;
  transition:opacity 0.6s ease;
}

/* PAGE LOAD */
body.loaded {
  opacity:1;
}

/* NAVBAR */
.navbar {
  position:fixed;
  top:0;
  width:100%;
  padding:15px 25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  backdrop-filter: blur(14px);
  background: rgba(2,6,23,0.5);
  transition:0.3s;
  z-index:1000;
}

.navbar.scrolled {
  background: rgba(2,6,23,0.85);
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.logo {
  font-weight:700;
  font-size:18px;
}

.nav-links a {
  margin-left:20px;
  text-decoration:none;
  color:#cbd5f5;
  font-size:14px;
  transition:0.3s;
}

.nav-links a:hover {
  color:white;
}

/* HERO */
.hero {
  height:100vh;
  position:relative;
  display:flex;
  align-items:center;
  padding:20px;
}

.hero video {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  top:0;
  left:0;
  z-index:-2;
}

.hero::after {
  content:"";
  position:absolute;
  inset:0;
  background: rgba(2,6,23,0.65);
  z-index:-1;
}

.hero-content {
  max-width:600px;
  animation:fadeUp 1s ease;
}

.hero h1 {
  font-size:40px;
  margin-bottom:15px;
}

.hero p {
  color:#94a3b8;
  margin-bottom:25px;
}

/* BUTTON */
.btn {
  display:inline-flex;
  align-items:center;
  gap:10px;
  background: linear-gradient(135deg,#22c55e,#16a34a);
  padding:14px 22px;
  border-radius:12px;
  text-decoration:none;
  color:white;
  font-weight:600;
  transition:0.3s;
}

.btn:hover {
  transform:translateY(-3px) scale(1.05);
}

/* GALLERY */
.section {
  padding:80px 20px;
  max-width:1100px;
  margin:auto;
}

.gallery {
  display:grid;
  grid-template-columns:1fr;
  gap:20px;
}

.item {
  position:relative;
  overflow:hidden;
  border-radius:20px;
  transform:translateY(60px);
  opacity:0;
  transition:0.7s;
}

.item.show {
  transform:translateY(0);
  opacity:1;
}

.item img {
  width:100%;
  height:260px;
  object-fit:cover;
  transition:0.6s;
}

.item:hover img {
  transform:scale(1.15);
}

.overlay {
  position:absolute;
  inset:0;
  background:rgba(2,6,23,0.6);
  display:flex;
  align-items:flex-end;
  padding:20px;
  opacity:0;
  transition:0.4s;
}

.item:hover .overlay {
  opacity:1;
}

/* FLOAT WHATSAPP */
.float-wa {
  position:fixed;
  bottom:20px;
  right:20px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  width:55px;
  height:55px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:22px;
  text-decoration:none;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  transition:0.3s;
}

.float-wa:hover {
  transform:scale(1.1);
}

/* ANIMATION */
@keyframes fadeUp {
  from {opacity:0; transform:translateY(30px);}
  to {opacity:1; transform:translateY(0);}
}

/* DESKTOP */
@media(min-width:768px){
  .hero h1 { font-size:60px; }

  .gallery {
    grid-template-columns: repeat(3,1fr);
  }
}
</style>
</head>

<body>

<div class="navbar" id="navbar">
  <div class="logo">Gundogdu Temizlik</div>

  <div class="nav-links">
    <a href="#hizmet">Hizmetler</a>
    <a href="#iletisim">İletişim</a>
  </div>
</div>

<!-- HERO -->
<section class="hero">
  <!-- KENDİ VİDEONU BURAYA KOY -->
  <video autoplay muted loop playsinline>
    <source src="video.mp4" type="video/mp4">
  </video>

  <div class="hero-content">
    <h1>Temizlikte Premium Deneyim</h1>
    <p>Modern ekip, hızlı servis ve kusursuz sonuç</p>

    <a href="https://wa.me/905555555555" class="btn">
      <i class="fa-brands fa-whatsapp"></i>
      Yaz
    </a>
  </div>
</section>

<!-- GALLERY -->
<section id="hizmet" class="section">
  <h2>Hizmetler</h2>

  <div class="gallery">
    <div class="item">
      <img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952">
      <div class="overlay">Ev Temizliği</div>
    </div>

    <div class="item">
      <img src="https://images.unsplash.com/photo-1527515637462-cff94eecc1ac">
      <div class="overlay">Ofis Temizliği</div>
    </div>

    <div class="item">
      <img src="https://images.unsplash.com/photo-1603712725038-e9334ae8f39f">
      <div class="overlay">İnşaat Sonrası</div>
    </div>
  </div>
</section>

<!-- FLOAT BUTTON -->
<a href="https://wa.me/905555555555" class="float-wa">
  <i class="fa-brands fa-whatsapp"></i>
</a>

<script>
/* PAGE LOAD */
window.onload = () => document.body.classList.add('loaded');

/* NAVBAR SCROLL */
window.addEventListener('scroll', () => {
  const nav = document.getElementById('navbar');
  if(window.scrollY > 50){
    nav.classList.add('scrolled');
  } else {
    nav.classList.remove('scrolled');
  }
});

/* SCROLL ANIMATION */
const items = document.querySelectorAll('.item');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
});

items.forEach(item => observer.observe(item));
</script>

</body>
</html>
