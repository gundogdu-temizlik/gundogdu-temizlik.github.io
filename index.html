<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>İstanbul Temizlik Hizmeti | Aynı Gün Profesyonel Ekip</title>

<meta name="description" content="İstanbul ev, ofis ve inşaat sonrası profesyonel temizlik. Aynı gün hizmet, sigortalı ekip, ücretsiz fiyat teklifi.">
<meta name="keywords" content="istanbul temizlik, ev temizliği, ofis temizliği, inşaat sonrası temizlik">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#0b1220;
  color:white;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}

.hero video{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.65);
  z-index:-1;
}

.container{
  max-width:900px;
  text-align:center;
  padding:20px;
}

h1{
  font-size:44px;
  margin-bottom:10px;
}

.sub{
  color:#cbd5e1;
  margin-bottom:25px;
}

/* CTA BUTTONS */
.cta{
  display:flex;
  gap:15px;
  justify-content:center;
  flex-wrap:wrap;
}

.btn{
  padding:14px 22px;
  border-radius:12px;
  text-decoration:none;
  font-weight:600;
  display:inline-flex;
  align-items:center;
  gap:10px;
}

.btn-green{
  background:#22c55e;
  color:white;
}

.btn-white{
  background:white;
  color:black;
}

/* TRUST BAR */
.trust{
  display:flex;
  justify-content:center;
  gap:30px;
  margin-top:25px;
  font-size:13px;
  color:#94a3b8;
}

/* SECTION */
.section{
  padding:60px 20px;
  max-width:900px;
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:15px;
}

.card{
  background:#111827;
  padding:18px;
  border-radius:14px;
  border:1px solid #1f2937;
}

/* LEAD FORM */
.form{
  background:#111827;
  padding:20px;
  border-radius:14px;
  border:1px solid #1f2937;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  font-weight:700;
  cursor:pointer;
}

/* FLOAT WA */
.wa{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#22c55e;
  width:55px;
  height:55px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:22px;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">

<video autoplay muted loop>
  <source src="video/hero.mp4">
</video>

<div class="container">

  <h1>İstanbul Profesyonel Temizlik</h1>
  <p class="sub">Aynı gün hizmet • Sigortalı ekip • Ücretsiz fiyat teklifi</p>

  <div class="cta">
    <a class="btn btn-green" href="https://wa.me/905555555555">
      <i class="fa-brands fa-whatsapp"></i> WhatsApp Teklif
    </a>

    <a class="btn btn-white" href="#form">
      Fiyat Öğren
    </a>
  </div>

  <div class="trust">
    <div>✔ 24 Saat Servis</div>
    <div>✔ Sigortalı Ekip</div>
    <div>✔ Memnuniyet Garantisi</div>
  </div>

</div>
</section>

<!-- SERVICES -->
<section class="section">
  <h2>Hizmetler</h2>

  <div class="grid">

    <div class="card">🏠 Ev Temizliği</div>
    <div class="card">🏢 Ofis Temizliği</div>
    <div class="card">🏗 İnşaat Sonrası</div>

  </div>
</section>

<!-- LEAD FORM -->
<section class="section" id="form">
  <h2>Ücretsiz Fiyat Teklifi Al</h2>

  <div class="form">

    <input placeholder="Adınız">
    <input placeholder="Telefon">
    <input placeholder="Hizmet Türü (Ev / Ofis / İnşaat)">

    <button>Teklif Gönder</button>

  </div>
</section>

<!-- FLOAT WA -->
<a class="wa" href="https://wa.me/905555555555">
  <i class="fa-brands fa-whatsapp"></i>
</a>

</body>
</html>
