<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TemizPro | Premium Temizlik</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
html { scroll-behavior: smooth; }

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #020617;
  color: white;
}

/* NAVBAR */
.navbar {
  position: fixed;
  width: 100%;
  top: 0;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  backdrop-filter: blur(12px);
  background: rgba(2,6,23,0.6);
  z-index: 1000;
}

.logo {
  font-weight: 700;
  font-size: 18px;
}

.nav-links a {
  margin-left: 20px;
  text-decoration: none;
  color: #cbd5f5;
  font-size: 14px;
}

.nav-cta {
  background: linear-gradient(135deg,#0ea5e9,#22c55e);
  padding: 8px 14px;
  border-radius: 8px;
  text-decoration: none;
  color: white;
  font-size: 13px;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 20px;
  position: relative;
}

.hero::before {
  content: "";
  position: absolute;
  width: 300px;
  height: 300px;
  background: #0ea5e9;
  filter: blur(120px);
  top: 20%;
  left: 10%;
  opacity: 0.4;
}

.hero h1 {
  font-size: 36px;
  line-height: 1.2;
  margin-bottom: 15px;
}

.hero p {
  color: #94a3b8;
  margin-bottom: 25px;
}

.hero-buttons {
  display: flex;
  gap: 10px;
}

.btn-primary {
  background: linear-gradient(135deg,#0ea5e9,#22c55e);
  padding: 14px 20px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  font-weight: 600;
}

.btn-secondary {
  border: 1px solid rgba(255,255,255,0.2);
  padding: 14px 20px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
}

/* SECTIONS */
.section {
  padding: 80px 20px;
  max-width: 1100px;
  margin: auto;
}

.cards {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 16px;
  backdrop-filter: blur(10px);
  transform: translateY(40px);
  opacity: 0;
  transition: 0.6s;
}

.card.show {
  transform: translateY(0);
  opacity: 1;
}

/* WHATSAPP FLOAT (premium küçük) */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: rgba(37,211,102,0.15);
  border: 1px solid rgba(37,211,102,0.4);
  padding: 12px 16px;
  border-radius: 50px;
  color: #25D366;
  text-decoration: none;
  font-weight: 600;
  backdrop-filter: blur(10px);
}

/* DESKTOP */
@media(min-width:768px){
  .hero h1 { font-size: 56px; }

  .cards {
    flex-direction: row;
  }
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">TemizPro</div>

  <div class="nav-links">
    <a href="#hizmet">Hizmetler</a>
    <a href="#hakkimizda">Hakkımızda</a>
  </div>

  <a href="https://wa.me/905555555555" class="nav-cta">WhatsApp</a>
</div>

<section class="hero">
  <h1>Premium Temizlik Deneyimi</h1>
  <p>Eviniz ve ofisiniz için modern, hızlı ve güvenilir hizmet</p>

  <div class="hero-buttons">
    <a href="#hizmet" class="btn-primary">Hizmetleri Gör</a>
    <a href="https://wa.me/905555555555" class="btn-secondary">WhatsApp</a>
  </div>
</section>

<section id="hizmet" class="section">
  <h2>Hizmetler</h2>

  <div class="cards">
    <div class="card">Ev Temizliği</div>
    <div class="card">Ofis Temizliği</div>
    <div class="card">İnşaat Sonrası</div>
  </div>
</section>

<section id="hakkimizda" class="section">
  <h2>Hakkımızda</h2>
  <p>Profesyonel ekip, kaliteli hizmet ve müşteri memnuniyeti odaklı çalışma.</p>
</section>

<a href="https://wa.me/905555555555" class="whatsapp">Yaz</a>

<script>
const cards = document.querySelectorAll('.card');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
});

cards.forEach(card => observer.observe(card));
</script>

</body>
</html>
