<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gundogdu|PremiumTemizlik</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
html { scroll-behavior: smooth; }

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #020617;
  color: white;
  overflow-x: hidden;
}

/* NAVBAR */
.navbar {
  position: fixed;
  width: 100%;
  top: 0;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  backdrop-filter: blur(12px);
  background: rgba(2,6,23,0.6);
  z-index: 1000;
}

.logo { font-weight: 700; }

.nav-links a {
  margin-left: 15px;
  color: #cbd5f5;
  text-decoration: none;
  font-size: 14px;
}

/* HERO VIDEO */
.hero {
  height: 100vh;
  position: relative;
  display: flex;
  align-items: center;
  padding: 20px;
}

.hero video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  top: 0;
  left: 0;
  z-index: -2;
}

.hero::after {
  content:"";
  position:absolute;
  inset:0;
  background: rgba(2,6,23,0.6);
  z-index:-1;
}

.hero-content {
  max-width: 600px;
}

.hero h1 {
  font-size: 38px;
  margin-bottom: 15px;
}

.hero p {
  color: #94a3b8;
  margin-bottom: 25px;
}

/* BUTTONS */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg,#22c55e,#16a34a);
  padding: 14px 20px;
  border-radius: 12px;
  color: white;
  text-decoration: none;
  font-weight: 600;
  transition: 0.3s;
}

.btn:hover {
  transform: translateY(-2px) scale(1.03);
}

/* SECTION */
.section {
  padding: 80px 20px;
  max-width: 1100px;
  margin: auto;
}

/* GLASS GALLERY */
.gallery {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

.item {
  position: relative;
  overflow: hidden;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  transform: translateY(60px);
  opacity: 0;
  transition: 0.7s;
}

.item.show {
  transform: translateY(0);
  opacity: 1;
}

.item img {
  width: 100%;
  height: 250px;
  object-fit: cover;
  transition: 0.5s;
}

.item:hover img {
  transform: scale(1.1);
}

.overlay {
  position: absolute;
  inset: 0;
  background: rgba(2,6,23,0.6);
  display: flex;
  align-items: flex-end;
  padding: 20px;
  opacity: 0;
  transition: 0.4s;
}

.item:hover .overlay {
  opacity: 1;
}

/* FLOAT WHATSAPP */
.float-whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: linear-gradient(135deg,#22c55e,#16a34a);
  padding: 14px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  transition: 0.3s;
}

.float-whatsapp:hover {
  transform: scale(1.1);
}

/* DESKTOP */
@media(min-width:768px){
  .hero h1 { font-size: 56px; }

  .gallery {
    grid-template-columns: repeat(3,1fr);
  }
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">Gundogdu Temizlik</div>
  <div class="nav-links">
    <a href="#hizmet">Hizmetler</a>
  </div>
</div>

<!-- HERO -->
<section class="hero">
  <video autoplay muted loop playsinline>
    <source src="https://cdn.coverr.co/videos/coverr-cleaning-a-window-1580/1080p.mp4" type="video/mp4">
  </video>

  <div class="hero-content">
    <h1>Eviniz Bizimle Parlasın</h1>
    <p>Premium temizlik deneyimi. Hızlı, güvenilir ve profesyonel.</p>

    <a href="https://wa.me/905555555555" class="btn">
      <!-- WhatsApp Icon -->
      <svg width="20" height="20" fill="white" viewBox="0 0 24 24">
        <path d="M20.5 3.5A11.9 11.9 0 0012 0 11.9 11.9 0 001.5 18.5L0 24l5.7-1.5A11.9 11.9 0 0012 24a11.9 11.9 0 008.5-20.5zM12 22a9.9 9.9 0 01-5-1.4l-.4-.2-3.4.9.9-3.3-.2-.4A9.9 9.9 0 1112 22zm5.5-7.3c-.3-.1-1.8-.9-2.1-1s-.5-.1-.7.1-.8 1-.9 1.2-.4.2-.7.1a8.1 8.1 0 01-2.4-1.5 9 9 0 01-1.7-2.1c-.2-.3 0-.5.1-.7l.5-.6c.2-.2.2-.3.3-.5s0-.4 0-.6-.7-1.7-1-2.3c-.2-.6-.5-.5-.7-.5h-.6a1.2 1.2 0 00-.9.4c-.3.3-1.2 1.2-1.2 3s1.2 3.6 1.4 3.8a13.5 13.5 0 005.2 4.7c.7.3 1.3.5 1.8.6.8.3 1.6.3 2.2.2.7-.1 1.8-.7 2-1.3.3-.6.3-1.2.2-1.3-.1-.1-.3-.2-.6-.3z"/>
      </svg>
      Yaz
    </a>
  </div>
</section>

<!-- GALLERY -->
<section id="hizmet" class="section">
  <h2>Hizmetlerimiz</h2>

  <div class="gallery">
    <div class="item">
      <img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952">
      <div class="overlay">Ev Temizliği</div>
    </div>

    <div class="item">
      <img src="https://images.unsplash.com/photo-1527515637462-cff94eecc1ac">
      <div class="overlay">Ofis Temizliği</div>
    </div>

    <div class="item">
      <img src="https://images.unsplash.com/photo-1603712725038-e9334ae8f39f">
      <div class="overlay">İnşaat Sonrası</div>
    </div>
  </div>
</section>

<!-- FLOAT BUTTON -->
<a href="https://wa.me/905555555555" class="float-whatsapp">
  <svg width="24" height="24" fill="white" viewBox="0 0 24 24">
    <path d="M20.5 3.5A11.9 11.9 0 0012 0 11.9 11.9 0 001.5 18.5L0 24l5.7-1.5A11.9 11.9 0 0012 24a11.9 11.9 0 008.5-20.5z"/>
  </svg>
</a>

<script>
const items = document.querySelectorAll('.item');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
});

items.forEach(item => observer.observe(item));
</script>

</body>
</html>
